<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGradient)"/>
  
  <!-- Manga book/pages illustration -->
  <g transform="translate(100, 80)">
    <!-- Left page -->
    <rect x="20" y="40" width="90" height="200" fill="#ffffff" stroke="#667eea" stroke-width="3" rx="4"/>
    
    <!-- Right page -->
    <rect x="120" y="40" width="90" height="200" fill="#f0f0f0" stroke="#667eea" stroke-width="3" rx="4"/>
    
    <!-- Spine -->
    <rect x="110" y="40" width="8" height="200" fill="#667eea"/>
    
    <!-- Comic style panels on left page -->
    <rect x="30" y="55" width="70" height="45" fill="none" stroke="#667eea" stroke-width="2" rx="2"/>
    <rect x="30" y="110" width="70" height="45" fill="none" stroke="#667eea" stroke-width="2" rx="2"/>
    <rect x="30" y="165" width="70" height="65" fill="none" stroke="#667eea" stroke-width="2" rx="2"/>
    
    <!-- Accent lines on right page -->
    <line x1="130" y1="60" x2="200" y2="60" stroke="url(#accentGradient)" stroke-width="3" stroke-linecap="round"/>
    <line x1="130" y1="85" x2="190" y2="85" stroke="url(#accentGradient)" stroke-width="2" stroke-linecap="round"/>
    <line x1="130" y1="100" x2="185" y2="100" stroke="url(#accentGradient)" stroke-width="2" stroke-linecap="round"/>
    
    <line x1="130" y1="135" x2="200" y2="135" stroke="url(#accentGradient)" stroke-width="3" stroke-linecap="round"/>
    <line x1="130" y1="160" x2="190" y2="160" stroke="url(#accentGradient)" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Download arrow icon -->
  <g transform="translate(256, 340)">
    <!-- Arrow down -->
    <path d="M 0 -30 L 0 20 M -20 5 L 0 25 L 20 5" stroke="#ffffff" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="80" cy="420" r="6" fill="#f5576c" opacity="0.8"/>
  <circle cx="432" cy="420" r="6" fill="#f5576c" opacity="0.8"/>
</svg>
